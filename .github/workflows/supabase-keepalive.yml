name: Supabase keep-alive

# Free-tier Supabase projects pause after ~7 days with no DATABASE activity.
# This makes one tiny read against the DB every 3 days so the project never pauses.
# The publishable (anon) key is public by design — the same key the site ships.

on:
  schedule:
    - cron: "0 12 */3 * *"   # every 3 days at 12:00 UTC
  workflow_dispatch:          # lets you trigger it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query site_previews to keep Postgres warm
        env:
          SUPABASE_URL: https://dcspbdqkkbeyyvwgazbb.supabase.co
          SUPABASE_KEY: sb_publishable_MZGrAC-gmpIY_CiZcuTs1A_4XOyoHId
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/site_previews?select=token&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")
          echo "Keep-alive HTTP status: $code"
          # 200 (rows or empty) and 401/403 (RLS) all still reached Postgres.
          # Only a network/DNS failure (000) means the project is paused/down.
          if [ "$code" = "000" ]; then
            echo "::error::Could not reach Supabase — project may be paused."
            exit 1
          fi
