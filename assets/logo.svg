<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none" role="img" aria-label="ElipsionAI logo mark">
  <defs>
    <linearGradient id="elipsion-shell" x1="10" y1="8" x2="54" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102B46"/>
      <stop offset="1" stop-color="#071522"/>
    </linearGradient>
    <linearGradient id="elipsion-flow" x1="18" y1="18" x2="48" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- A compact hexagonal system/container. -->
  <path
    d="M32 4.5 53.5 17v25L32 54.5 10.5 42V17L32 4.5Z"
    fill="url(#elipsion-shell)"
    stroke="#38BDF8"
    stroke-width="2.5"
    stroke-linejoin="round"
  />

  <!-- The E is one continuous route: three entry points feeding one system. -->
  <path
    d="M42.5 18.5H23V45.5H42.5M23 32H37"
    stroke="url(#elipsion-flow)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Captured-lead endpoint. -->
  <circle cx="46.5" cy="18.5" r="4.25" fill="#22C55E" stroke="#071522" stroke-width="2"/>
</svg>
